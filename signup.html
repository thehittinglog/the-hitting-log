<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hitting log | Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="signup">
  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="index.html" aria-label="hitting log home"><img src="assets/hitting-log-logo.png" alt="hitting log" class="brand-logo"></a>
      <nav class="top-nav" aria-label="Main navigation">
        <a class="nav-link" href="login.html">Login</a>
        <a class="nav-link is-active" href="/signup">Sign Up</a>
      </nav>
    </div>
  </header>

  <main class="page-shell narrow-shell">
    <section class="hero compact-hero">
      <p class="eyebrow">Create Account</p>
      <h1>Start your hitting log.</h1>
      <p class="hero-copy">
        Create your account and start tracking the details that help you become a better hitter.
      </p>
    </section>

    <section class="panel">
      <h2>Sign Up</h2>
      <form id="signup-form" class="login-form">
        <label>
          <span>Email</span>
          <input type="email" id="signup-email" placeholder="player@example.com" autocomplete="email" required>
        </label>
        <label>
          <span>Password</span>
          <input type="password" id="signup-password" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" required>
        </label>
        <label>
          <span>Sport</span>
          <select id="signup-sport-type" required>
            <option value="baseball">Baseball</option>
            <option value="softball">Softball</option>
          </select>
        </label>
        <button type="submit">Create Account</button>
      </form>
      <p id="signup-message" class="form-message" aria-live="polite"></p>
      <p class="auth-switch">Already have an account? <a class="text-link" href="login.html">Log in</a></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="scripts/supabase-client.js"></script>
  <script src="scripts/auth.js"></script>
  <script src="app.js"></script>

  <footer class="site-footer">
    <div class="nav-shell site-footer-shell">
      <div class="footer-links">
        <a class="footer-link" href="/terms">Terms of Service</a>
        <a class="footer-link" href="privacy.html">Privacy Policy</a>
        <a class="footer-link" href="/faq">FAQ</a>
        <a class="footer-link" href="/support">Support</a>
      </div>
    </div>
  </footer>
</body>
</html>
