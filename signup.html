<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hitting Log | Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="signup">
  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="index.html">Hitting Log</a>
      <nav class="top-nav" aria-label="Main navigation">
        <a class="nav-link" href="login.html">Login</a>
        <a class="nav-link is-active" href="signup.html">Sign Up</a>
      </nav>
    </div>
  </header>

  <main class="page-shell narrow-shell">
    <section class="hero compact-hero">
      <p class="eyebrow">Create Account</p>
      <h1>Start your hitting log.</h1>
      <p class="hero-copy">
        Create a simple local account to save your session in this browser.
      </p>
    </section>

    <section class="panel">
      <h2>Sign Up</h2>
      <form id="signup-form" class="login-form">
        <label>
          <span>Email</span>
          <input type="email" id="signup-email" placeholder="player@example.com" required>
        </label>
        <label>
          <span>Password</span>
          <input type="password" id="signup-password" placeholder="Create password" required>
        </label>
        <button type="submit">Create Account</button>
      </form>
      <p id="signup-message" class="form-message" aria-live="polite"></p>
      <p class="auth-switch">
        Already have an account? <a class="text-link" href="login.html">Log in</a>
      </p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
