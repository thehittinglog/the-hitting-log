<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hitting log | Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">
  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="index.html" aria-label="hitting log home"><img src="assets/hitting-log-logo.png" alt="hitting log" class="brand-logo"></a>
      <nav class="top-nav" aria-label="Main navigation">
        <a class="nav-link is-active" href="login.html">Login</a>
      </nav>
    </div>
  </header>

  <main class="page-shell narrow-shell">
    <section class="hero compact-hero">
      <p class="eyebrow">Account</p>
      <h1>Sign in to your hitting log.</h1>
      <p class="hero-copy">
        Sign in to get back to your saved dashboard.
      </p>
    </section>

    <section class="panel">
      <h2>Login</h2>
      <form id="login-form" class="login-form">
        <label>
          <span>Email</span>
          <input type="email" id="login-email" placeholder="player@example.com" required>
        </label>
        <label>
          <span>Password</span>
          <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password" required>
        </label>
        <p class="auth-field-link"><a class="text-link" href="/forgot-password">Forgot password?</a></p>
        <button type="submit">Sign In</button>
      </form>
      <p id="login-message" class="form-message" aria-live="polite"></p>
      <p class="auth-switch">New here? <a class="text-link" href="/signup">Create an account</a></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="scripts/supabase-client.js"></script>
  <script src="scripts/auth.js"></script>
  <script src="app.js"></script>

  <footer class="site-footer">
    <div class="nav-shell site-footer-shell">
      <div class="footer-links">
        <a class="footer-link" href="/terms">Terms of Service</a>
        <a class="footer-link" href="privacy.html">Privacy Policy</a>
        <a class="footer-link" href="/faq">FAQ</a>
        <a class="footer-link" href="/support">Support</a>
      </div>
    </div>
  </footer>
</body>
</html>
