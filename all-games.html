<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hitting log | All Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="all-games">
  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="index.html" aria-label="hitting log home"><img src="assets/hitting-log-logo.png" alt="hitting log" class="brand-logo"></a>
      <nav class="top-nav" aria-label="Main navigation">
        <a class="nav-link" href="dashboard.html">Dashboard</a>
        <a class="nav-link is-active" href="games.html">Games</a>
        <a class="nav-link" href="advanced-stats.html">Advanced Stats</a>
        <a class="nav-link" href="charts.html">Charts</a>
        <a class="nav-link" href="account.html">Account</a>
        <button id="logout-button" class="nav-button" type="button" hidden>Logout</button>
      </nav>
    </div>
  </header>

  <main class="page-shell">
    <section class="hero compact-hero">
      <p class="eyebrow">Game Log</p>
      <h1>All logged games.</h1>
      <p class="hero-copy">
        Review your full game history, sorted by game date.
      </p>
    </section>

    <section class="panel">
      <div class="section-heading">
        <div>
          <h2>All Games</h2>
          <p class="section-copy">Showing 20 games per page.</p>
        </div>
        <a class="text-link" href="games.html">Back to Games</a>
      </div>
      <div class="table-wrap">
        <table class="logged-games-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Opponent</th>
              <th>Batting Average</th>
              <th>HLP Score</th>
            </tr>
          </thead>
          <tbody id="all-games-table-body"></tbody>
        </table>
      </div>
      <p id="all-games-empty" class="empty-state">No games logged yet.</p>
      <nav id="all-games-pagination" class="pagination-controls" aria-label="All games pagination"></nav>
    </section>
  </main>

  <script src="scripts/data-store.js"></script>
  <script src="scripts/metric-performance.js"></script>
  <script src="app.js"></script>

  <footer class="site-footer">
    <div class="nav-shell site-footer-shell">
      <div class="footer-links">
        <a class="footer-link" href="/terms">Terms of Service</a>
        <a class="footer-link" href="privacy.html">Privacy Policy</a>
        <a class="footer-link" href="/faq">FAQ</a>
        <a class="footer-link" href="/support">Support</a>
      </div>
    </div>
  </footer>
</body>
</html>
