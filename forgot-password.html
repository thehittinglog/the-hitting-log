<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hitting log | Reset Your Password</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="forgot-password">
  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="index.html" aria-label="hitting log home"><img src="assets/hitting-log-logo.png" alt="hitting log" class="brand-logo"></a>
      <nav class="top-nav" aria-label="Main navigation">
        <a class="nav-link" href="/login">Login</a>
      </nav>
    </div>
  </header>

  <main class="page-shell narrow-shell">
    <section class="hero compact-hero">
      <p class="eyebrow">Account Recovery</p>
      <h1>Reset Your Password</h1>
      <p class="hero-copy">Enter the email address associated with your account, and we’ll send you a secure password-reset link.</p>
    </section>

    <section class="panel">
      <h2>Send a Reset Link</h2>
      <form id="forgot-password-form" class="login-form" novalidate>
        <label for="forgot-password-email">
          <span>Email address</span>
          <input type="email" id="forgot-password-email" placeholder="player@example.com" autocomplete="email" required>
        </label>
        <button type="submit">Send Reset Link</button>
      </form>
      <p id="forgot-password-message" class="form-message" role="status" aria-live="polite" aria-atomic="true"></p>
      <p class="auth-switch"><a class="text-link" href="/login">Back to Login</a></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="scripts/supabase-client.js"></script>
  <script src="scripts/auth.js"></script>
  <script src="app.js"></script>

  <footer class="site-footer">
    <div class="nav-shell site-footer-shell">
      <div class="footer-links">
        <a class="footer-link" href="/terms">Terms of Service</a>
        <a class="footer-link" href="privacy.html">Privacy Policy</a>
        <a class="footer-link" href="/faq">FAQ</a>
        <a class="footer-link" href="/support">Support</a>
      </div>
    </div>
  </footer>
</body>
</html>
