<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hitting log | Create a New Password</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="reset-password">
  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="index.html" aria-label="hitting log home"><img src="assets/hitting-log-logo.png" alt="hitting log" class="brand-logo"></a>
      <nav class="top-nav" aria-label="Main navigation">
        <a class="nav-link" href="/login">Login</a>
      </nav>
    </div>
  </header>

  <main class="page-shell narrow-shell">
    <section class="hero compact-hero">
      <p class="eyebrow">Account Recovery</p>
      <h1>Create a New Password</h1>
      <p class="hero-copy">Enter a new password for your The Hitting Log account.</p>
    </section>

    <section class="panel">
      <h2>Update Password</h2>
      <form id="reset-password-form" class="login-form" novalidate>
        <label for="reset-password-new">
          <span>New password</span>
          <input type="password" id="reset-password-new" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" required disabled>
        </label>
        <label for="reset-password-confirm">
          <span>Confirm new password</span>
          <input type="password" id="reset-password-confirm" placeholder="Re-enter your new password" autocomplete="new-password" minlength="8" required disabled>
        </label>
        <button type="submit" disabled>Update Password</button>
      </form>
      <p id="reset-password-message" class="form-message" role="status" aria-live="polite" aria-atomic="true">Validating your password-reset link...</p>
      <p id="request-new-reset-link" class="auth-recovery-action" hidden><a class="button-link" href="/forgot-password">Request a New Reset Link</a></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="scripts/supabase-client.js"></script>
  <script src="scripts/auth.js"></script>
  <script src="app.js"></script>

  <footer class="site-footer">
    <div class="nav-shell site-footer-shell">
      <div class="footer-links">
        <a class="footer-link" href="/terms">Terms of Service</a>
        <a class="footer-link" href="privacy.html">Privacy Policy</a>
        <a class="footer-link" href="/faq">FAQ</a>
        <a class="footer-link" href="/support">Support</a>
      </div>
    </div>
  </footer>
</body>
</html>
